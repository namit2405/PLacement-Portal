services:
  - type: web
    name: placement-portal-backend
    runtime: python
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "gunicorn placement_portal.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://placement-portal-frontend.vercel.app"
      - key: DATABASE_URL
        fromDatabase:
          name: placement-portal-db
          property: connectionString

databases:
  - name: placement-portal-db
    databaseName: placement_portal
    user: placement_portal
