name: Keep Backend Alive

on:
  schedule:
    # Runs every 5 minutes
    - cron: "*/5 * * * *"
  workflow_dispatch: # allow manual trigger too

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend
        run: |
          curl -f https://placement-portal-iwwu.onrender.com/api/ping/ || echo "Ping failed (service may be starting up)"
